<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;text-align:center;padding:20px;">

<h1>Chipping Tool PRO</h1>

<input type="file" accept="image/*" multiple id="input">

<br><br>

<canvas id="canvas" style="max-width:100%"></canvas>

<h2 id="result"></h2>

<button onclick="exportExcel()">Export Excel</button>

<script>
let results = [];

document.getElementById("input").addEventListener("change", function(e) {
  const files = e.target.files;

  for (let file of files) {
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => analyze(img, file.name);
  }
});

function analyze(img, name) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  let grayVals = [];
  for (let i = 0; i < data.length; i += 4) {
    let g = (data[i] + data[i+1] + data[i+2]) / 3;
    grayVals.push(g);
  }

  let threshold = grayVals.sort((a,b)=>a-b)[Math.floor(grayVals.length*0.7)];

  let white = 0;
  let crossLoss = 0;
  let blockSize = 20;

  for (let y = 0; y < canvas.height; y += blockSize) {
    for (let x = 0; x < canvas.width; x += blockSize) {

      let localWhite = 0;
      let localTotal = 0;

      for (let j = 0; j < blockSize; j++) {
        for (let i = 0; i < blockSize; i++) {

          let px = ((y+j)*canvas.width + (x+i)) * 4;
          if (px >= data.length) continue;

          let g = (data[px] + data[px+1] + data[px+2]) / 3;

          if (g > threshold) {
            localWhite++;
            white++;
          }

          localTotal++;
        }
      }

      let localCoverage = localWhite / localTotal;

      if (localCoverage < 0.5 && localCoverage > 0.1) {
        crossLoss++;
      }
    }
  }

  let total = canvas.width * canvas.height;
  let coverage = white / total;

  let ideal = 0.18;
  let chipping = Math.max(0, (ideal - coverage) / ideal * 100);

  let crossChipping = (crossLoss / (total / (blockSize*blockSize))) * 100;

  document.getElementById("result").innerText =
    `Image: ${name}
Chipping: ${chipping.toFixed(2)} %
Cross: ${crossChipping.toFixed(2)} %`;

  results.push({name, chipping, crossChipping});
}

function exportExcel() {
  let csv = "Image,Chipping,Cross\n";

  results.forEach(r => {
    csv += `${r.name},${r.chipping},${r.crossChipping}\n`;
  });

  let blob = new Blob([csv], {type: "text/csv"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "results.csv";
  a.click();
}
</script>

</body>
</html>
