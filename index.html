<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family:sans-serif; text-align:center; padding:15px; background:#f5f5f5; }
    canvas { max-width:100%; margin-top:10px; }
    button { padding:10px; margin:10px; background:#007BFF; color:white; border:none; border-radius:8px;}
  </style>
</head>

<body>

<h2>Chipping Tool PRO V3</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => handle(e.target));
document.getElementById("camera").addEventListener("change", e => handle(e.target));

function handle(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> analyze(img, file.name);
  };
  reader.readAsDataURL(file);
}

// =====================
// ANALISI SERIA
// =====================
function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let w = canvas.width;
  let h = canvas.height;

  let imgData = ctx.getImageData(0,0,w,h);
  let d = imgData.data;

  let edgeMap = new Array(w*h).fill(0);

  // 🔍 SOBEL EDGE
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let i = (y*w+x)*4;

      let g =
        (d[i]+d[i+1]+d[i+2])/3;

      let gx =
        ((d[i+4]+d[i+5]+d[i+6]) - (d[i-4]+d[i-3]+d[i-2]));

      let gy =
        ((d[i+w*4]+d[i+w*4+1]+d[i+w*4+2]) -
         (d[i-w*4]+d[i-w*4+1]+d[i-w*4+2]));

      let grad = Math.abs(gx)+Math.abs(gy);

      if(grad>60){
        edgeMap[y*w+x]=1;
      }
    }
  }

  // 📊 PROIEZIONI
  let colSum = new Array(w).fill(0);
  let rowSum = new Array(h).fill(0);

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(edgeMap[y*w+x]){
        colSum[x]++;
        rowSum[y]++;
      }
    }
  }

  // 🔥 TROVA PICCHI (linee)
  function findPeaks(arr, threshold){
    let peaks=[];
    for(let i=1;i<arr.length-1;i++){
      if(arr[i]>threshold && arr[i]>arr[i-1] && arr[i]>arr[i+1]){
        peaks.push(i);
      }
    }
    return peaks;
  }

  let vLines = findPeaks(colSum, Math.max(...colSum)*0.3);
  let hLines = findPeaks(rowSum, Math.max(...rowSum)*0.3);

  // 🎯 PRENDI SOLO LE 6 CENTRALI
  function middle6(arr){
    let mid = Math.floor(arr.length/2);
    return arr.slice(mid-3, mid+3);
  }

  vLines = middle6(vLines);
  hLines = middle6(hLines);

  let edges=0, broken=0;

  // 🔬 ANALISI SOLO SULLE LINEE
  vLines.forEach(x=>{
    for(let y=0;y<h;y++){
      let i = (y*w+x)*4;

      let left  = (d[i-4]+d[i-3]+d[i-2])/3;
      let right = (d[i+4]+d[i+5]+d[i+6])/3;

      let diff = Math.abs(left-right);

      edges++;

      if(diff>25){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  });

  hLines.forEach(y=>{
    for(let x=0;x<w;x++){
      let i = (y*w+x)*4;

      let up   = (d[i-w*4]+d[i-w*4+1]+d[i-w*4+2])/3;
      let down = (d[i+w*4]+d[i+w*4+1]+d[i+w*4+2])/3;

      let diff = Math.abs(up-down);

      edges++;

      if(diff>25){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  });

  ctx.putImageData(imgData,0,0);

  let chipping = (broken/edges)*100;

  document.getElementById("result").innerText =
    `${name}\nChipping: ${chipping.toFixed(2)} %`;

  results.push({name, chipping});
}

function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Results");
  XLSX.writeFile(wb, "results.xlsx");
}

</script>

</body>
</html>
