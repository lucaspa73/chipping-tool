<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V21</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{max-width:95%;margin-top:10px;border-radius:12px}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:white}
</style>
</head>

<body>

<h1>Chipping Tool PRO V21</h1>

<input type="file" id="file"><br>
<button onclick="process()">ANALISI PRECISA</button>

<canvas id="canvas"></canvas>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("file").onchange=e=>{
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(e.target.files[0])
}

function process(){

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

let gray=[]
for(let i=0;i<d.length;i+=4){
gray.push((d[i]+d[i+1]+d[i+2])/3)
}

// ===== EDGE DETECTION =====
let edges=[]
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=y*w+x

let gx =
-gray[i-w-1]-2*gray[i-1]-gray[i+w-1]
+gray[i-w+1]+2*gray[i+1]+gray[i+w+1]

let gy =
-gray[i-w-1]-2*gray[i-w]-gray[i-w+1]
+gray[i+w-1]+2*gray[i+w]+gray[i+w+1]

let g=Math.sqrt(gx*gx+gy*gy)

edges.push(g>80?255:0)
}
}

// ===== LINE MASK (solo linee forti) =====
let lineMask=new Array(w*h).fill(0)

for(let i=0;i<edges.length;i++){
if(edges[i]){
lineMask[i]=1
}
}

// ===== DILATA per avere spessore linea =====
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x

if(lineMask[i]){
for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){
lineMask[(y+dy)*w+(x+dx)]=1
}
}
}
}
}

// ===== CHIPPING SOLO SU LINEE =====
let total=0
let chip=0

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=y*w+x

if(lineMask[i]){

let p=i*4
let g=(d[p]+d[p+1]+d[p+2])/3

// linea = chiara
if(g>160){
total++

// interruzione = più scuro
if(g<140){
chip++

d[p]=255
d[p+1]=0
d[p+2]=0
}
}
}
}
}

let perc=(chip/total)*100

// ISO
let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,0,0)

document.getElementById("res").innerHTML=
`<h2>Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</h2>`

}

</script>

</body>
</html>
