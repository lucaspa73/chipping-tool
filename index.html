<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V25.1</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f6f8}
canvas{max-width:95%;margin-top:10px;border-radius:12px}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:#fff}
</style>
</head>

<body>

<h1>Chipping Tool PRO V25.1</h1>

<!-- ✅ GALLERIA + FOTOCAMERA -->
<input type="file" id="file" accept="image/*" capture="environment"><br>

<button onclick="analyze()">Analisi</button>

<canvas id="canvas"></canvas>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("file").onchange=e=>{
const file = e.target.files[0]
if(!file) return

img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(file)
}

function analyze(){

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

// Quadrato 6x6 centrale
let centerX=w/2
let centerY=h/2
let squareSize=6
let roiX=centerX-squareSize/2
let roiY=centerY-squareSize/2
let roiW=squareSize
let roiH=squareSize

let gray=new Float32Array(w*h)

for(let i=0,j=0;i<d.length;i+=4,j++){
gray[j]=(d[i]+d[i+1]+d[i+2])/3
}

// normalizzazione
let min=255,max=0
for(let i=0;i<gray.length;i++){
if(gray[i]<min)min=gray[i]
if(gray[i]>max)max=gray[i]
}
for(let i=0;i<gray.length;i++){
gray[i]=255*(gray[i]-min)/(max-min+1)
}

// inverti
for(let i=0;i<gray.length;i++){
gray[i]=255-gray[i]
}

let mask=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

// Considera SOLO il quadrato 6x6 centrale
if(x<roiX||x>roiX+roiW||y<roiY||y>roiY+roiH) continue

let i=y*w+x

let gx = gray[i+1]-gray[i-1]
let gy = gray[i+w]-gray[i-w]
let edge = Math.sqrt(gx*gx+gy*gy)

let local=0,count=0
for(let dy=-2;dy<=2;dy++){
for(let dx=-2;dx<=2;dx++){
local+=gray[(y+dy)*w+(x+dx)]
count++
}
}
let avg=local/count

let micro = gray[i] > avg + 12

if(edge>20 || micro){
mask[i]=1
}
}
}

// pulizia
let clean=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

let i=y*w+x
if(!mask[i]) continue

let n=0
for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){
if(mask[(y+dy)*w+(x+dx)]) n++
}
}

if(n>=3) clean[i]=1
}
}

let chip=0
let total=roiW*roiH

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=y*w+x

if(clean[i]){
chip++

let p=i*4
d[p]=255
d[p+1]=0
d[p+2]=0
}
}
}

let perc = (chip/total)*100

let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,0,0)

// Disegna il quadrato 6x6 centrale con un rettangolo
ctx.strokeStyle='yellow'
ctx.lineWidth=2
ctx.strokeRect(roiX,roiY,roiW,roiH)

document.getElementById("res").innerHTML=
`<h2>Chipping Quadrato 6x6 Centrale: ${perc.toFixed(2)} % | ISO: ${iso}</h2>`

}

</script>

</body>
</html>
