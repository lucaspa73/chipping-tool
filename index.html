<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V4.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family:sans-serif; text-align:center; padding:15px; background:#f5f5f5; }
    canvas { max-width:100%; margin-top:10px; }
    button { padding:10px; margin:10px; background:#007BFF; color:white; border:none; border-radius:8px;}
  </style>
</head>

<body>

<h2>Chipping Tool PRO V4.1</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => load(e.target));
document.getElementById("camera").addEventListener("change", e => load(e.target));

function load(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> {
      try {
        analyze(img, file.name);
      } catch(err){
        document.getElementById("result").innerText = "Errore analisi";
        console.error(err);
      }
    };
  };
  reader.readAsDataURL(file);
}

function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let w = canvas.width;
  let h = canvas.height;

  let imgData = ctx.getImageData(0,0,w,h);
  let d = imgData.data;

  let edge = new Array(w*h).fill(0);

  // EDGE
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let i=(y*w+x)*4;

      let gx = Math.abs(d[i+4]-d[i-4]);
      let gy = Math.abs(d[i+w*4]-d[i-w*4]);

      if(gx+gy > 50){
        edge[y*w+x]=1;
      }
    }
  }

  // PROIEZIONI
  let col = new Array(w).fill(0);
  let row = new Array(h).fill(0);

  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(edge[y*w+x]){
        col[x]++;
        row[y]++;
      }
    }
  }

  // SMOOTH
  function smooth(arr){
    let out=[...arr];
    for(let i=2;i<arr.length-2;i++){
      out[i]=(arr[i-2]+arr[i-1]+arr[i]+arr[i+1]+arr[i+2])/5;
    }
    return out;
  }

  col = smooth(col);
  row = smooth(row);

  // PEAKS
  function peaks(arr){
    let p=[];
    let max=Math.max(...arr);
    if(max===0) return p;

    for(let i=2;i<arr.length-2;i++){
      if(arr[i]>max*0.4 && arr[i]>arr[i-1] && arr[i]>arr[i+1]){
        p.push(i);
      }
    }
    return p;
  }

  let v = peaks(col);
  let hL = peaks(row);

  // FALLBACK (se non trova linee)
  if(v.length < 6 || hL.length < 6){
    document.getElementById("result").innerText =
      "Linee non rilevate correttamente";
    return;
  }

  function center6(a){
    let mid=Math.floor(a.length/2);
    return a.slice(mid-3,mid+3);
  }

  v=center6(v);
  hL=center6(hL);

  let edges=0, broken=0;

  // ANALISI SICURA
  v.forEach(x=>{
    for(let y=1;y<h-1;y++){

      let i=(y*w+x)*4;

      let l=(d[i-4]+d[i-3]+d[i-2])/3;
      let r=(d[i+4]+d[i+5]+d[i+6])/3;

      let diff=Math.abs(l-r);

      edges++;

      if(diff>30){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  });

  hL.forEach(y=>{
    for(let x=1;x<w-1;x++){

      let i=(y*w+x)*4;

      let u=(d[i-w*4]+d[i-w*4+1]+d[i-w*4+2])/3;
      let dn=(d[i+w*4]+d[i+w*4+1]+d[i+w*4+2])/3;

      let diff=Math.abs(u-dn);

      edges++;

      if(diff>30){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  });

  ctx.putImageData(imgData,0,0);

  let chipping = (edges>0) ? (broken/edges)*100 : 0;

  document.getElementById("result").innerText =
    `${name}\nChipping: ${chipping.toFixed(2)} %`;

  results.push({name, chipping});
}

function exportExcel(){
  if(results.length===0){
    alert("Nessun dato");
    return;
  }
  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Results");
  XLSX.writeFile(wb, "results.xlsx");
}

</script>

</body>
</html>
