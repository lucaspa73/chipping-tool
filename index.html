<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 10px; }

    input, button {
      margin: 8px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      background-color: #007BFF;
      color: white;
    }

    canvas {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>Chipping Tool PRO</h2>

<!-- Galleria -->
<input type="file" accept="image/*" id="gallery">

<!-- Camera -->
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Seleziona o scatta una foto</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

// =======================
// INPUT HANDLING (ROBUSTO)
// =======================

document.getElementById("gallery").addEventListener("change", e => handleFile(e.target));
document.getElementById("camera").addEventListener("change", e => handleFile(e.target));

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = () => analyze(img, file.name);
  };

  reader.readAsDataURL(file);
}

// =======================
// ANALISI AVANZATA
// =======================

function analyze(img, name) {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  let gray = [];

  // grayscale
  for (let i = 0; i < data.length; i += 4) {
    let g = (data[i] + data[i+1] + data[i+2]) / 3;
    gray.push(g);
  }

  // threshold automatico (Otsu)
  let threshold = otsu(gray);

  let white = 0;

  for (let i = 0; i < data.length; i += 4) {

    let g = (data[i] + data[i+1] + data[i+2]) / 3;

    // rileva differenza reale (fondamentale per superfici chiare)
    if (g < threshold - 10) {
      data[i] = data[i+1] = data[i+2] = 0;
    } else {
      data[i] = data[i+1] = data[i+2] = 255;
      white++;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  let total = canvas.width * canvas.height;
  let coverage = white / total;

  let ideal = 0.18;
  let chipping = Math.max(0, (ideal - coverage) / ideal * 100);

  document.getElementById("result").innerText =
    `${name}
Chipping: ${chipping.toFixed(2)} %`;

  results.push({image: name, chipping: chipping.toFixed(2)});
}

// =======================
// OTSU THRESHOLD
// =======================

function otsu(gray) {

  let hist = new Array(256).fill(0);
  gray.forEach(v => hist[Math.floor(v)]++);

  let total = gray.length;
  let sum = 0;

  for (let i = 0; i < 256; i++) {
    sum += i * hist[i];
  }

  let sumB = 0, wB = 0, wF = 0, max = 0, threshold = 0;

  for (let i = 0; i < 256; i++) {

    wB += hist[i];
    if (wB === 0) continue;

    wF = total - wB;
    if (wF === 0) break;

    sumB += i * hist[i];

    let mB = sumB / wB;
    let mF = (sum - sumB) / wF;

    let between = wB * wF * (mB - mF) * (mB - mF);

    if (between > max) {
      max = between;
      threshold = i;
    }
  }

  return threshold;
}

// =======================
// EXPORT EXCEL
// =======================

function exportExcel() {

  if (results.length === 0) {
    alert("Nessun dato da esportare");
    return;
  }

  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Results");

  XLSX.writeFile(wb, "ChippingResults.xlsx");
}

</script>

</body>
</html>
