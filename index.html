<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V20 AUTO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{max-width:95%;border-radius:12px;margin-top:10px}
button{padding:10px 20px;margin:10px;font-size:16px;border-radius:8px;border:none;background:#007bff;color:#fff}
</style>
</head>

<body>

<h1>Chipping Tool PRO V20 AUTO</h1>

<input type="file" id="files" accept="image/*"><br>
<button onclick="process()">AUTO ANALISI</button>

<canvas id="canvas"></canvas>
<div id="results"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("files").onchange=e=>{
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(e.target.files[0])
}

// ================= PROCESS =================
function process(){

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

// === grayscale ===
let gray=[]
for(let i=0;i<d.length;i+=4){
gray.push((d[i]+d[i+1]+d[i+2])/3)
}

// === sobel ===
let edges=[]
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=y*w+x

let gx =
-gray[i-w-1]-2*gray[i-1]-gray[i+w-1]
+gray[i-w+1]+2*gray[i+1]+gray[i+w+1]

let gy =
-gray[i-w-1]-2*gray[i-w]-gray[i-w+1]
+gray[i+w-1]+2*gray[i+w]+gray[i+w+1]

let g=Math.sqrt(gx*gx+gy*gy)

edges.push(g>60?255:0)
}
}

// === trova bounding area linee ===
let minX=w, maxX=0, minY=h, maxY=0

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
let i=y*w+x
if(edges[i]>0){
if(x<minX)minX=x
if(x>maxX)maxX=x
if(y<minY)minY=y
if(y>maxY)maxY=y
}
}
}

// sicurezza
if(maxX-minX<50){
alert("Quadrato non rilevato")
return
}

// === crop ===
let cropW=maxX-minX
let cropH=maxY-minY

let crop=ctx.getImageData(minX,minY,cropW,cropH)
let cd=crop.data

// === chipping calcolo migliorato ===
let total=0
let chip=0

for(let i=0;i<cd.length;i+=4){

let g=(cd[i]+cd[i+1]+cd[i+2])/3

// linee = chiare
if(g>180){
total++

// chipping = interruzioni
if(g<200){
chip++
cd[i]=255
cd[i+1]=0
cd[i+2]=0
}
}
}

let perc=(chip/total)*100

// ISO
let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

// draw risultato
ctx.putImageData(crop,minX,minY)

// output
document.getElementById("results").innerHTML=
`<h2>Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</h2>`

}

</script>

</body>
</html>
