<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V2.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 { margin-bottom: 10px; }

    input {
      margin: 8px;
      padding: 8px;
    }

    canvas {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>Chipping Tool PRO V2.1</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => handle(e.target));
document.getElementById("camera").addEventListener("change", e => handle(e.target));

function handle(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> analyze(img, file.name);
  };
  reader.readAsDataURL(file);
}


// ==========================
// 🔬 ANALISI PRINCIPALE
// ==========================
function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  let w = canvas.width;
  let h = canvas.height;

  let lineMap = new Array(w*h).fill(0);

  // ==========================
  // STEP 1: DETECT LINEE
  // ==========================
  for(let y=2; y<h-2; y++){
    for(let x=2; x<w-2; x++){

      let i = (y*w + x)*4;

      let gx = Math.abs(data[i+4] - data[i-4]);
      let gy = Math.abs(data[i+w*4] - data[i-w*4]);

      let grad = gx + gy;

      if(grad > 60){
        lineMap[y*w + x] = 1;
      }
    }
  }

  // ==========================
  // STEP 2: ESPANSIONE LINEE
  // ==========================
  for(let y=2; y<h-2; y++){
    for(let x=2; x<w-2; x++){

      if(lineMap[y*w + x]){
        for(let dy=-1; dy<=1; dy++){
          for(let dx=-1; dx<=1; dx++){
            lineMap[(y+dy)*w + (x+dx)] = 1;
          }
        }
      }
    }
  }

  // ==========================
  // STEP 3: CENTRO REALE
  // ==========================
  let xs=[], ys=[];
  for(let i=0;i<lineMap.length;i++){
    if(lineMap[i]){
      xs.push(i%w);
      ys.push(Math.floor(i/w));
    }
  }

  let cx = xs.reduce((a,b)=>a+b,0)/xs.length;
  let cy = ys.reduce((a,b)=>a+b,0)/ys.length;

  let edges = 0;
  let broken = 0;

  // ==========================
  // STEP 4: ANALISI LINEE (FIX)
  // ==========================
  for(let y=2; y<h-2; y++){
    for(let x=2; x<w-2; x++){

      let idx = y*w + x;

      if(!lineMap[idx]) continue;

      // ROI centrale dinamica
      if(Math.abs(x-cx)>w*0.15 || Math.abs(y-cy)>h*0.15) continue;

      let i = idx*4;

      let g = (data[i]+data[i+1]+data[i+2])/3;

      let left  = (data[i-4]+data[i-3]+data[i-2])/3;
      let right = (data[i+4]+data[i+5]+data[i+6])/3;

      let diff = Math.abs(left - right);

      edges++;

      // 🔥 CRITERIO CORRETTO
      if(diff > 25){
        broken++;
        data[i]=255; data[i+1]=0; data[i+2]=0; // rosso difetto
      } else {
        data[i]=0; data[i+1]=255; data[i+2]=0; // verde OK
      }
    }
  }

  ctx.putImageData(imageData,0,0);

  let chipping = (broken / edges) * 100;

  document.getElementById("result").innerText =
    `${name}
Chipping: ${chipping.toFixed(2)} %`;

  results.push({image: name, chipping: chipping.toFixed(2)});
}


// ==========================
// 📊 EXPORT EXCEL
// ==========================
function exportExcel(){

  if(results.length === 0){
    alert("Nessun dato");
    return;
  }

  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Results");

  XLSX.writeFile(wb, "ChippingResults.xlsx");
}

</script>

</body>
</html>
