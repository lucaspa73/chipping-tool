<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V24</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f6f8}
canvas{max-width:95%;margin-top:10px;border-radius:12px}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:#fff}
</style>
</head>

<body>

<h1>Chipping Tool PRO V24 (Dark Analysis)</h1>

<input type="file" id="file"><br>
<button onclick="analyze()">Analisi V24</button>

<canvas id="canvas"></canvas>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("file").onchange=e=>{
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(e.target.files[0])
}

function analyze(){

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

// ===== GRAYSCALE =====
let gray=new Float32Array(w*h)
for(let i=0,j=0;i<d.length;i+=4,j++){
gray[j]=(d[i]+d[i+1]+d[i+2])/3
}

// ===== NORMALIZZAZIONE (stretch contrasto) =====
let min=255,max=0
for(let i=0;i<gray.length;i++){
if(gray[i]<min)min=gray[i]
if(gray[i]>max)max=gray[i]
}

for(let i=0;i<gray.length;i++){
gray[i]=255*(gray[i]-min)/(max-min+1)
}

// ===== INVERTI (linee diventano scure) =====
for(let i=0;i<gray.length;i++){
gray[i]=255-gray[i]
}

// ===== BLUR LEGGERO =====
let smooth=new Float32Array(w*h)
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x
smooth[i]=(
gray[i]+gray[i-1]+gray[i+1]+gray[i-w]+gray[i+w]
)/5
}
}

// ===== THRESHOLD ADATTIVO =====
let mask=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

let i=y*w+x

let local=0
let count=0

for(let dy=-2;dy<=2;dy++){
for(let dx=-2;dx<=2;dx++){
local+=smooth[(y+dy)*w+(x+dx)]
count++
}
}

let avg=local/count

// pixel più scuri della media = incisione
if(smooth[i] > avg + 8){
mask[i]=1
}
}
}

// ===== FILTRO LINEARE (elimina rumore puntiforme) =====
let clean=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

let i=y*w+x

if(mask[i]){

let neighbors=0

for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){
if(mask[(y+dy)*w+(x+dx)]) neighbors++
}
}

// tiene solo strutture "continue"
if(neighbors >= 4){
clean[i]=1
}
}
}
}

// ===== CALCOLO =====
let total=0
let chip=0

for(let i=0;i<w*h;i++){
if(clean[i]){
total++

chip++

let p=i*4
d[p]=255
d[p+1]=0
d[p+2]=0
}
}

let perc = (chip/(w*h))*100

// ISO realistico
let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,0,0)

document.getElementById("res").innerHTML=
`<h2>Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</h2>`

}

</script>

</body>
</html>
