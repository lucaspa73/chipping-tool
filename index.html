<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    button, input {
      margin: 8px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      background-color: #007BFF;
      color: white;
    }

    canvas {
      max-width: 100%;
      margin-top: 15px;
      border-radius: 10px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>Chipping Tool PRO</h2>

<!-- GALLERIA -->
<input type="file" accept="image/*" id="gallery">

<br>

<!-- CAMERA -->
<input type="file" accept="image/*" capture="environment" id="camera">

<br>

<canvas id="canvas"></canvas>

<div id="result">Seleziona o scatta una foto</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

// 🔹 funzione unica per gestire file
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const img = new Image();
    img.src = event.target.result;

    img.onload = function() {
      analyze(img, file.name);
    };
  };

  reader.readAsDataURL(file);
}

// eventi
document.getElementById("gallery").addEventListener("change", function() {
  handleFile(this);
});

document.getElementById("camera").addEventListener("change", function() {
  handleFile(this);
});


// 🔬 ANALISI
function analyze(img, name) {

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  let white = 0;

  for (let i = 0; i < data.length; i += 4) {

    let gray = (data[i] + data[i+1] + data[i+2]) / 3;

    if (gray > 150) {
      data[i] = data[i+1] = data[i+2] = 255;
      white++;
    } else {
      data[i] = data[i+1] = data[i+2] = 0;
    }
  }

  ctx.putImageData(imageData, 0, 0);

  let total = canvas.width * canvas.height;
  let coverage = white / total;

  let ideal = 0.18;
  let chipping = Math.max(0, (ideal - coverage) / ideal * 100);

  document.getElementById("result").innerText =
    `${name}
Chipping: ${chipping.toFixed(2)} %`;

  results.push({
    image: name,
    chipping: chipping.toFixed(2)
  });
}


// 📊 EXPORT EXCEL
function exportExcel() {

  if (results.length === 0) {
    alert("Nessun dato da esportare");
    return;
  }

  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Results");

  XLSX.writeFile(wb, "ChippingResults.xlsx");
}

</script>

</body>
</html>
