<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V1.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family:sans-serif; text-align:center; padding:15px; background:#f5f5f5; }
    canvas { max-width:100%; margin-top:10px; }
    button { padding:10px; margin:10px; background:#007BFF; color:white; border:none; border-radius:8px;}
  </style>
</head>

<body>

<h2>Chipping Tool PRO</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => handle(e.target));
document.getElementById("camera").addEventListener("change", e => handle(e.target));

function handle(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> analyze(img, file.name);
  };
  reader.readAsDataURL(file);
}

// 🔬 ANALISI MIGLIORATA (LINEE REALI)
function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  let w = canvas.width;
  let h = canvas.height;

  // ROI più stretto (centro reale)
  let x1 = Math.floor(w*0.35);
  let x2 = Math.floor(w*0.65);
  let y1 = Math.floor(h*0.35);
  let y2 = Math.floor(h*0.65);

  let edges = 0;
  let broken = 0;

  for(let y=y1+2; y<y2-2; y++){
    for(let x=x1+2; x<x2-2; x++){

      let i = (y*w + x)*4;

      let g = (data[i]+data[i+1]+data[i+2])/3;

      // gradienti separati (verticale/orizzontale)
      let gx = Math.abs((data[i+4] - data[i-4]));
      let gy = Math.abs((data[i+w*4] - data[i-w*4]));

      // filtro linee vere (non rumore)
      if((gx > 40 && gy < 20) || (gy > 40 && gx < 20)){

        edges++;

        // verifica perdita (contrasto locale)
        let localAvg =
          ((data[i-4]+data[i-3]+data[i-2]) +
           (data[i+4]+data[i+5]+data[i+6])) / 6;

        if(g > localAvg - 5){
          broken++;
          data[i]=255; data[i+1]=0; data[i+2]=0; // difetto
        } else {
          data[i]=0; data[i+1]=255; data[i+2]=0; // OK
        }
      }
    }
  }

  ctx.putImageData(imageData,0,0);

  let chipping = (broken / edges) * 100;

  document.getElementById("result").innerText =
    `${name}
Chipping: ${chipping.toFixed(2)} %`;

  results.push({name, chipping});
}

function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Results");
  XLSX.writeFile(wb, "results.xlsx");
}

</script>

</body>
</html>
