<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family:sans-serif; text-align:center; padding:15px; background:#f5f5f5;}
    canvas { max-width:100%; margin-top:10px;}
    button { padding:10px; margin:10px; background:#007BFF; color:white; border:none; border-radius:8px;}
  </style>
</head>

<body>

<h2>Chipping Tool PRO V8</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results=[];

document.getElementById("gallery").addEventListener("change", e=>load(e.target));
document.getElementById("camera").addEventListener("change", e=>load(e.target));

function load(input){
  const file=input.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.src=e.target.result;
    img.onload=()=>analyze(img,file.name);
  };
  reader.readAsDataURL(file);
}

function analyze(img,name){

  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=img.width;
  canvas.height=img.height;

  ctx.drawImage(img,0,0);

  let w=canvas.width;
  let h=canvas.height;

  let imgData=ctx.getImageData(0,0,w,h);
  let d=imgData.data;

  let mask=new Array(w*h).fill(0);

  let grads=[];

  // ==========================
  // STEP 1: GRADIENT + raccolta stats
  // ==========================
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let i=(y*w+x)*4;

      let gx=Math.abs(d[i+4]-d[i-4]);
      let gy=Math.abs(d[i+w*4]-d[i-w*4]);

      let grad=gx+gy;

      grads.push(grad);
    }
  }

  // ==========================
  // STEP 2: SOGLIA ADATTIVA
  // ==========================
  grads.sort((a,b)=>a-b);
  let threshold = grads[Math.floor(grads.length*0.85)];

  // ==========================
  // STEP 3: SEGMENTAZIONE
  // ==========================
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let i=(y*w+x)*4;

      let gx=Math.abs(d[i+4]-d[i-4]);
      let gy=Math.abs(d[i+w*4]-d[i-w*4]);

      let grad=gx+gy;

      if(grad>threshold){
        mask[y*w+x]=1;
      }
    }
  }

  // ==========================
  // STEP 4: CENTRO
  // ==========================
  let xs=[], ys=[];
  for(let i=0;i<mask.length;i++){
    if(mask[i]){
      xs.push(i%w);
      ys.push(Math.floor(i/w));
    }
  }

  let cx=xs.reduce((a,b)=>a+b,0)/xs.length;
  let cy=ys.reduce((a,b)=>a+b,0)/ys.length;

  let edges=0, broken=0;

  // ==========================
  // STEP 5: ANALISI CENTRALE
  // ==========================
  let roi = Math.min(w,h)*0.2;

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      if(Math.abs(x-cx)>roi || Math.abs(y-cy)>roi) continue;

      let idx=y*w+x;
      if(!mask[idx]) continue;

      let i=idx*4;

      let local =
        Math.abs(d[i]-d[i+4]) +
        Math.abs(d[i]-d[i-4]);

      edges++;

      if(local>40){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  }

  ctx.putImageData(imgData,0,0);

  let chipping=(broken/edges)*100;

  document.getElementById("result").innerText=
    `${name}\nChipping: ${chipping.toFixed(2)} %`;

  results.push({name,chipping});
}

function exportExcel(){
  let ws=XLSX.utils.json_to_sheet(results);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Results");
  XLSX.writeFile(wb,"results.xlsx");
}

</script>

</body>
</html>
