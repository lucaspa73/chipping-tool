<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V25.1</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f6f8;padding:20px}
canvas{max-width:95%;margin-top:10px;border-radius:12px;cursor:crosshair;border:2px solid #ddd}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:#fff;cursor:pointer}
button:hover{background:#0056b3}
button:disabled{background:#ccc;cursor:not-allowed}
#info{margin-top:20px;font-size:14px;color:#666}
.selection{display:inline-block;padding:10px;background:#ffe6e6;border-radius:8px;margin:10px 0}
</style>
</head>

<body>

<h1>Chipping Tool PRO V25.1</h1>

<input type="file" id="file" accept="image/*" capture="environment"><br>

<div id="selectionMode" style="display:none">
  <div class="selection">
    <p>Clicca sui 4 vertici del quadrato 6x6 (in ordine: alto-sx, alto-dx, basso-dx, basso-sx)</p>
    <p id="clickCount">Vertici selezionati: <strong>0/4</strong></p>
  </div>
  <button onclick="resetSelection()" style="background:#dc3545">Ripeti Selezione</button>
</div>

<canvas id="canvas"></canvas>

<div id="info"></div>

<button id="analyzeBtn" onclick="analyze()" style="display:none">Analisi</button>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

let selectionMode=false
let vertices=[]
let selectedROI=null

// Carica immagine
document.getElementById("file").onchange=e=>{
const file=e.target.files[0]
if(!file) return

img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
selectionMode=true
vertices=[]
selectedROI=null
document.getElementById("selectionMode").style.display="block"
document.getElementById("analyzeBtn").style.display="none"
document.getElementById("res").innerHTML=""
}
img.src=URL.createObjectURL(file)
}

// Click per selezionare vertici
canvas.onclick=e=>{
if(!selectionMode) return

const rect=canvas.getBoundingClientRect()
const x=e.clientX-rect.left
const y=e.clientY-rect.top

vertices.push({x,y})
document.getElementById("clickCount").innerText=`Vertici selezionati: <strong>${vertices.length}/4</strong>`

// Disegna punto
ctx.fillStyle="#ff0000"
ctx.beginPath()
ctx.arc(x,y,5,0,Math.PI*2)
ctx.fill()

// Testo numero
ctx.fillStyle="#fff"
ctx.font="bold 12px Arial"
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.fillText(vertices.length,x,y)

if(vertices.length===4){
  // Calcola ROI dal quadrato
  let minX=Math.min(vertices[0].x,vertices[1].x,vertices[2].x,vertices[3].x)
  let maxX=Math.max(vertices[0].x,vertices[1].x,vertices[2].x,vertices[3].x)
  let minY=Math.min(vertices[0].y,vertices[1].y,vertices[2].y,vertices[3].y)
  let maxY=Math.max(vertices[0].y,vertices[1].y,vertices[2].y,vertices[3].y)
  
  selectedROI={
    x:minX,
    y:minY,
    w:maxX-minX,
    h:maxY-minY
  }
  
  // Disegna rettangolo
  ctx.strokeStyle="#ffff00"
  ctx.lineWidth=3
  ctx.strokeRect(selectedROI.x,selectedROI.y,selectedROI.w,selectedROI.h)
  
  // Abilita analisi
  selectionMode=false
  document.getElementById("selectionMode").style.display="none"
  document.getElementById("analyzeBtn").style.display="inline-block"
  
  document.getElementById("info").innerHTML=
    `<strong>Quadrato selezionato:</strong> (${selectedROI.x.toFixed(0)}, ${selectedROI.y.toFixed(0)}) - ${selectedROI.w.toFixed(0)}x${selectedROI.h.toFixed(0)}px`
}
}

function resetSelection(){
ctx.drawImage(img,0,0)
vertices=[]
selectedROI=null
document.getElementById("clickCount").innerText=`Vertici selezionati: <strong>0/4</strong>`
}

function analyze(){
if(!selectedROI){
  alert("Seleziona prima il quadrato!")
  return
}

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

let roiX=selectedROI.x
let roiY=selectedROI.y
let roiW=selectedROI.w
let roiH=selectedROI.h

let gray=new Float32Array(w*h)

for(let i=0,j=0;i<d.length;i+=4,j++){
gray[j]=(d[i]+d[i+1]+d[i+2])/3
}

// normalizzazione
let min=255,max=0
for(let i=0;i<gray.length;i++){
if(gray[i]<min)min=gray[i]
if(gray[i]>max)max=gray[i]
}
for(let i=0;i<gray.length;i++){
gray[i]=255*(gray[i]-min)/(max-min+1)
}

// inverti
for(let i=0;i<gray.length;i++){
gray[i]=255-gray[i]
}

let mask=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

// Considera SOLO il quadrato selezionato
if(x<roiX||x>roiX+roiW||y<roiY||y>roiY+roiH) continue

let i=y*w+x

let gx=gray[i+1]-gray[i-1]
let gy=gray[i+w]-gray[i-w]
let edge=Math.sqrt(gx*gx+gy*gy)

let local=0,count=0
for(let dy=-2;dy<=2;dy++){
for(let dx=-2;dx<=2;dx++){
local+=gray[(y+dy)*w+(x+dx)]
count++
}
}
let avg=local/count

let micro=gray[i]>avg+12

if(edge>20||micro){
mask[i]=1
}
}
}

// pulizia
let clean=new Uint8Array(w*h)

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

let i=y*w+x
if(!mask[i]) continue

let n=0
for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){
if(mask[(y+dy)*w+(x+dx)]) n++
}
}

if(n>=3) clean[i]=1
}
}

let chip=0
let total=roiW*roiH

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=y*w+x

if(clean[i]){
chip++

let p=i*4
d[p]=255
d[p+1]=0
d[p+2]=0
}
}
}

let perc=(chip/total)*100

let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,0,0)

// Ridisegna rettangolo
ctx.strokeStyle="#ffff00"
ctx.lineWidth=3
ctx.strokeRect(roiX,roiY,roiW,roiH)

document.getElementById("res").innerHTML=
`<h2>Chipping nel Quadrato Selezionato: ${perc.toFixed(2)} % | ISO: ${iso}</h2>
<p style="color:#666">Pixel danneggiati: ${chip} / ${total}</p>`

document.getElementById("analyzeBtn").innerHTML="Analizza di Nuovo"

}

</script>

</body>
</html>
