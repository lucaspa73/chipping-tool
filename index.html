<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO V6.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    canvas {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>Chipping Tool PRO V6.1</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => load(e.target));
document.getElementById("camera").addEventListener("change", e => load(e.target));

function load(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> analyze(img, file.name);
  };
  reader.readAsDataURL(file);
}

function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let w = canvas.width;
  let h = canvas.height;

  let imgData = ctx.getImageData(0,0,w,h);
  let d = imgData.data;

  let lineMask = new Array(w*h).fill(0);

  // ==========================
  // STEP 1: DETECT LINEE (robusto)
  // ==========================
  for(let y=2;y<h-2;y++){
    for(let x=2;x<w-2;x++){

      let i=(y*w+x)*4;

      let c=(d[i]+d[i+1]+d[i+2])/3;

      let left=(d[i-4]+d[i-3]+d[i-2])/3;
      let right=(d[i+4]+d[i+5]+d[i+6])/3;
      let up=(d[i-w*4]+d[i-w*4+1]+d[i-w*4+2])/3;
      let down=(d[i+w*4]+d[i+w*4+1]+d[i+w*4+2])/3;

      let contrast =
        Math.abs(c-left) +
        Math.abs(c-right) +
        Math.abs(c-up) +
        Math.abs(c-down);

      if(contrast > 40){
        lineMask[y*w+x] = 1;
      }
    }
  }

  // ==========================
  // STEP 2: ESPANSIONE
  // ==========================
  for(let y=2;y<h-2;y++){
    for(let x=2;x<w-2;x++){
      if(lineMask[y*w+x]){
        for(let dy=-1;dy<=1;dy++){
          for(let dx=-1;dx<=1;dx++){
            lineMask[(y+dy)*w+(x+dx)] = 1;
          }
        }
      }
    }
  }

  let edges = 0;
  let broken = 0;

  // ==========================
  // STEP 3: CONTINUITÀ LINEA
  // ==========================
  for(let y=2;y<h-2;y++){
    for(let x=2;x<w-2;x++){

      let idx = y*w+x;
      if(!lineMask[idx]) continue;

      let i = idx*4;

      let neighbors =
        lineMask[y*w+(x-1)] +
        lineMask[y*w+(x+1)] +
        lineMask[(y-1)*w+x] +
        lineMask[(y+1)*w+x];

      edges++;

      if(neighbors < 2){
        broken++;
        d[i]=255; d[i+1]=0; d[i+2]=0;
      } else {
        d[i]=0; d[i+1]=255; d[i+2]=0;
      }
    }
  }

  ctx.putImageData(imgData,0,0);

  if(edges === 0){
    document.getElementById("result").innerText =
      "Linee non rilevate (abbassa soglia)";
    return;
  }

  let chipping = (broken / edges) * 100;

  document.getElementById("result").innerText =
    `${name}\nChipping: ${chipping.toFixed(2)} %`;

  results.push({image:name, chipping:chipping.toFixed(2)});
}


// ==========================
// EXPORT
// ==========================
function exportExcel(){

  if(results.length === 0){
    alert("Nessun dato");
    return;
  }

  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Results");

  XLSX.writeFile(wb, "ChippingResults.xlsx");
}

</script>

</body>
</html>
