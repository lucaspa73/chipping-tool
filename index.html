<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V18 AUTO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{max-width:95%;border-radius:12px;margin-top:10px;touch-action:none}
button{padding:10px 20px;margin:10px;font-size:16px;border-radius:8px;border:none;background:#007bff;color:#fff}
</style>
</head>

<body>

<h1>Chipping Tool PRO V18 AUTO</h1>

<input type="file" id="files" multiple accept="image/*"><br>
<button onclick="exportExcel()">Export Excel</button>

<canvas id="canvas"></canvas>

<div id="results"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let images=[]
let current=0
let points=[]
let results=[]

// ================= LOAD =================
document.getElementById("files").onchange=e=>{
images=[...e.target.files]
current=0
loadImage()
}

function loadImage(){
let img=new Image()
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
points=[]
}
img.src=URL.createObjectURL(images[current])
}

// ================= CLICK =================
canvas.onclick=e=>{
if(points.length<4){
let rect=canvas.getBoundingClientRect()
let x=(e.clientX-rect.left)*canvas.width/rect.width
let y=(e.clientY-rect.top)*canvas.height/rect.height

points.push({x,y})

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(x,y,5,0,2*Math.PI)
ctx.fill()

if(points.length==4){
analyze()
}
}
}

// ================= ANALYSIS =================
function analyze(){

let minX=Math.min(...points.map(p=>p.x))
let maxX=Math.max(...points.map(p=>p.x))
let minY=Math.min(...points.map(p=>p.y))
let maxY=Math.max(...points.map(p=>p.y))

let w=maxX-minX
let h=maxY-minY

let imgData=ctx.getImageData(minX,minY,w,h)
let d=imgData.data

let totalLine=0
let chipped=0

let sumGray=0
let countGray=0

// ================= STEP 1: trova luminosità linea =================
for(let i=0;i<d.length;i+=4){

let gray=(d[i]+d[i+1]+d[i+2])/3

if(gray>200){
sumGray+=gray
countGray++
}
}

let avgGray = countGray>0 ? sumGray/countGray : 230

// ================= AUTO THRESHOLD =================
let threshold = (255 - avgGray) + 25
// adattivo: più la linea è scura → più tollerante

// ================= STEP 2: calcolo chipping =================
for(let i=0;i<d.length;i+=4){

let r=d[i]
let g=d[i+1]
let b=d[i+2]

let gray=(r+g+b)/3

if(gray < 180) continue

if(gray > 200){

totalLine++

let darkness = 255 - gray

if(darkness > threshold){
chipped++

d[i]=255
d[i+1]=0
d[i+2]=0
}
}
}

let perc = totalLine>0 ? (chipped/totalLine)*100 : 0

// ISO
let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,minX,minY)

// salva
results.push({
name:images[current].name,
chipping:perc.toFixed(2),
iso
})

// output
document.getElementById("results").innerHTML+=`
<p><b>${images[current].name}</b><br>
Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</p>
`

current++
if(current<images.length){
loadImage()
}
}

// ================= EXPORT =================
function exportExcel(){

let wb=XLSX.utils.book_new()
let ws=XLSX.utils.json_to_sheet(results)

XLSX.utils.book_append_sheet(wb,ws,"Chipping")

XLSX.writeFile(wb,"chipping_report.xlsx")
}

</script>

</body>
</html>
