function otsuThreshold(gray) {
  let hist = new Array(256).fill(0);
  gray.forEach(v => hist[Math.floor(v)]++);

  let total = gray.length;
  let sum = 0;
  for (let i=0;i<256;i++) sum += i*hist[i];

  let sumB = 0, wB = 0, wF = 0, max = 0, threshold = 0;

  for (let i=0;i<256;i++) {
    wB += hist[i];
    if (wB === 0) continue;
    wF = total - wB;
    if (wF === 0) break;

    sumB += i*hist[i];
    let mB = sumB / wB;
    let mF = (sum - sumB) / wF;

    let between = wB * wF * (mB - mF) ** 2;

    if (between > max) {
      max = between;
      threshold = i;
    }
  }
  return threshold;
}
