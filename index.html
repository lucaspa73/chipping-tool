<!DOCTYPE html>
<html>
<head>
  <title>Chipping Tool PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: sans-serif; text-align:center; padding:15px; background:#f5f5f5; }
    canvas { max-width:100%; margin-top:10px; }
    button { padding:10px; margin:10px; background:#007BFF; color:white; border:none; border-radius:8px;}
  </style>
</head>

<body>

<h2>Chipping Tool PRO</h2>

<input type="file" accept="image/*" id="gallery">
<input type="file" accept="image/*" capture="environment" id="camera">

<canvas id="canvas"></canvas>

<div id="result">Carica immagine</div>

<button onclick="exportExcel()">📊 Export Excel</button>

<script>

let results = [];

document.getElementById("gallery").addEventListener("change", e => handle(e.target));
document.getElementById("camera").addEventListener("change", e => handle(e.target));

function handle(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.src = e.target.result;
    img.onload = ()=> analyze(img, file.name);
  };
  reader.readAsDataURL(file);
}

// 🔬 ANALISI MIGLIORATA (ROI + LINEE)
function analyze(img, name){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img,0,0);

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  // 🎯 ROI centrale (40% centrale)
  let xStart = Math.floor(canvas.width * 0.3);
  let xEnd   = Math.floor(canvas.width * 0.7);
  let yStart = Math.floor(canvas.height * 0.3);
  let yEnd   = Math.floor(canvas.height * 0.7);

  let edges = 0;
  let broken = 0;

  for(let y=yStart+1; y<yEnd-1; y++){
    for(let x=xStart+1; x<xEnd-1; x++){

      let i = (y*canvas.width + x)*4;

      let g = (data[i]+data[i+1]+data[i+2])/3;

      // gradiente (line detection)
      let gx = Math.abs(data[i+4] - data[i-4]);
      let gy = Math.abs(data[i+canvas.width*4] - data[i-canvas.width*4]);

      let grad = gx + gy;

      if(grad > 35){ // linea

        edges++;

        // pixel chiaro = perdita materiale
        if(g > 170){
          broken++;
          data[i]=255; data[i+1]=0; data[i+2]=0; // rosso difetto
        } else {
          data[i]=0; data[i+1]=255; data[i+2]=0; // verde linea OK
        }
      }
    }
  }

  ctx.putImageData(imageData,0,0);

  let chipping = (broken / edges) * 100;

  document.getElementById("result").innerText =
    `${name}
Chipping: ${chipping.toFixed(2)} %`;

  results.push({name, chipping});
}

function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(results);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Results");
  XLSX.writeFile(wb, "results.xlsx");
}

</script>

</body>
</html>
