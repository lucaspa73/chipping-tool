<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V19.2</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{max-width:95%;border-radius:12px;margin-top:10px;touch-action:none}
button{padding:10px 20px;margin:10px;font-size:16px;border-radius:8px;border:none;background:#007bff;color:#fff}
input{padding:8px;margin:10px;font-size:16px;border-radius:8px}
</style>
</head>

<body>

<h1>Chipping Tool PRO V19.2</h1>

<input type="file" id="files" multiple accept="image/*"><br>

<input type="text" id="customName" placeholder="Nome immagine"><br>

<button onclick="exportExcel()">Export Excel</button>

<canvas id="canvas"></canvas>
<div id="results"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()
let images=[]
let current=0
let points=[]
let results=[]

// zoom state
let scale=1
let offsetX=0
let offsetY=0

// ================= LOAD =================
document.getElementById("files").onchange=e=>{
images=[...e.target.files]
current=0
loadImage()
}

function loadImage(){
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height

scale=1
offsetX=0
offsetY=0
points=[]

document.getElementById("customName").value=images[current].name

draw()
}
img.src=URL.createObjectURL(images[current])
}

// ================= DRAW =================
function draw(){
ctx.setTransform(1,0,0,1,0,0)
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.setTransform(scale,0,0,scale,offsetX,offsetY)
ctx.drawImage(img,0,0)

// punti
ctx.fillStyle="red"
points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,2*Math.PI)
ctx.fill()
})
}

// ================= TOUCH =================
let lastDist=0

canvas.addEventListener("touchstart", e=>{
if(e.touches.length==2){
lastDist=getDist(e)
}
})

canvas.addEventListener("touchmove", e=>{
e.preventDefault()

// pinch zoom
if(e.touches.length==2){
let dist=getDist(e)
let zoom=dist/lastDist
scale*=zoom
lastDist=dist
draw()
}

// pan
if(e.touches.length==1){
offsetX+=e.touches[0].movementX||0
offsetY+=e.touches[0].movementY||0
draw()
}
})

function getDist(e){
let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY
return Math.sqrt(dx*dx+dy*dy)
}

// ================= CLICK =================
canvas.addEventListener("click", e=>{
if(points.length>=4) return

let rect=canvas.getBoundingClientRect()

let x=(e.clientX-rect.left-offsetX)/scale
let y=(e.clientY-rect.top-offsetY)/scale

points.push({x,y})
draw()

if(points.length==4){
analyze()
}
})

// ================= ANALYSIS =================
function analyze(){

let name=document.getElementById("customName").value||images[current].name

let minX=Math.min(...points.map(p=>p.x))
let maxX=Math.max(...points.map(p=>p.x))
let minY=Math.min(...points.map(p=>p.y))
let maxY=Math.max(...points.map(p=>p.y))

let w=maxX-minX
let h=maxY-minY

let imgData=ctx.getImageData(minX,minY,w,h)
let d=imgData.data

let gray=[]
for(let i=0;i<d.length;i+=4){
gray.push((d[i]+d[i+1]+d[i+2])/3)
}

let totalLine=0
let chipped=0

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=y*w+x

let gx =
-gray[i-w-1] -2*gray[i-1] -gray[i+w-1] +
gray[i-w+1] +2*gray[i+1] +gray[i+w+1]

let gy =
-gray[i-w-1] -2*gray[i-w] -gray[i-w+1] +
gray[i+w-1] +2*gray[i+w] +gray[i+w+1]

let g=Math.sqrt(gx*gx+gy*gy)

if(g>40){
totalLine++

if(gray[i]<200){
chipped++
let idx=i*4
d[idx]=255
d[idx+1]=0
d[idx+2]=0
}
}
}
}

let perc = totalLine>0 ? (chipped/totalLine)*100 : 0

let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,minX,minY)

results.push({name,chipping:perc.toFixed(2),iso})

document.getElementById("results").innerHTML+=`
<p><b>${name}</b><br>
Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</p>
`

current++
if(current<images.length) loadImage()
}

// ================= EXPORT =================
function exportExcel(){
let wb=XLSX.utils.book_new()
let ws=XLSX.utils.json_to_sheet(results)
XLSX.utils.book_append_sheet(wb,ws,"Chipping")
XLSX.writeFile(wb,"chipping.xlsx")
}

</script>

</body>
</html>
