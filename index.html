<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chipping Tool PRO V12</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f5f5f5;
}

h1{
  margin-top:20px;
}

.container{
  margin:20px auto;
}

canvas{
  max-width:90%;
  border-radius:12px;
  margin-top:15px;
}

button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  margin-top:15px;
}
</style>
</head>

<body>

<h1>Chipping Tool PRO V12</h1>

<input type="file" accept="image/*" id="fileInput">

<div class="container">
<canvas id="canvas"></canvas>
</div>

<h2 id="result"></h2>

<script>

const input = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

input.addEventListener("change", e=>{
  const file = e.target.files[0];
  const img = new Image();

  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);

    processImage();
  }

  img.src = URL.createObjectURL(file);
});

function processImage(){

  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imgData.data;
  let w = canvas.width;
  let h = canvas.height;

  // GRAYSCALE
  let gray = new Array(w*h);
  for(let i=0;i<w*h;i++){
    gray[i]=(d[i*4]+d[i*4+1]+d[i*4+2])/3;
  }

  // SOBEL
  let grad = new Array(w*h).fill(0);

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){

      let gx =
        -gray[(y-1)*w+(x-1)] -2*gray[y*w+(x-1)] -gray[(y+1)*w+(x-1)]
        +gray[(y-1)*w+(x+1)] +2*gray[y*w+(x+1)] +gray[(y+1)*w+(x+1)];

      let gy =
        -gray[(y-1)*w+(x-1)] -2*gray[(y-1)*w+x] -gray[(y-1)*w+(x+1)]
        +gray[(y+1)*w+(x-1)] +2*gray[(y+1)*w+x] +gray[(y+1)*w+(x+1)];

      grad[y*w+x]=Math.sqrt(gx*gx+gy*gy);
    }
  }

  // threshold dinamico migliorato
  let grads = grad.slice().sort((a,b)=>a-b);
  let threshold = grads[Math.floor(grads.length*0.80)];

  let mask = new Array(w*h).fill(0);
  for(let i=0;i<w*h;i++){
    if(grad[i]>threshold) mask[i]=1;
  }

  // ROI centrale
  let startX = Math.floor(w*0.35);
  let endX   = Math.floor(w*0.65);
  let startY = Math.floor(h*0.35);
  let endY   = Math.floor(h*0.65);

  let total = 0;
  let broken = 0;

  for(let y=startY;y<endY;y++){
    for(let x=startX;x<endX;x++){

      let i = y*w+x;

      if(mask[i]){

        total++;

        let horiz =
          mask[y*w+(x-1)] +
          mask[y*w+(x+1)];

        let vert =
          mask[(y-1)*w+x] +
          mask[(y+1)*w+x];

        let isHorizontal = horiz > vert;
        let continuity = isHorizontal ? horiz : vert;

        let brokenPixel = false;

        // interruzione netta
        if(continuity === 0){
          brokenPixel = true;
        }

        // micro-chipping
        if(continuity === 1){

          let diag =
            mask[(y-1)*w+(x-1)] +
            mask[(y-1)*w+(x+1)] +
            mask[(y+1)*w+(x-1)] +
            mask[(y+1)*w+(x+1)];

          if(diag < 2){
            brokenPixel = true;
          }
        }

        if(brokenPixel){
          broken++;
          d[i*4]=255;
          d[i*4+1]=0;
          d[i*4+2]=0;
        } else {
          d[i*4]=0;
          d[i*4+1]=255;
          d[i*4+2]=0;
        }

      }

    }
  }

  ctx.putImageData(imgData,0,0);

  let percent = total ? (broken/total*100).toFixed(2) : 0;

  document.getElementById("result").innerHTML =
    "Chipping: " + percent + " %";

}

</script>

</body>
</html>
