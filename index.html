<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V22 - Modalità B</title>
<style>
body{font-family:Arial;text-align:center;background:#f4f6f8}
canvas{max-width:95%;border-radius:12px;margin-top:10px}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:#fff}
select{padding:8px;border-radius:6px}
</style>
</head>

<body>

<h1>Chipping Tool PRO V22</h1>

<input type="file" id="file"><br>
<button onclick="analyze()">Analisi (Modalità B)</button>

<br>
<label>Banda linea:</label>
<select id="band">
<option value="1">Stretta (1px)</option>
<option value="2" selected>Bilanciata (2px)</option>
<option value="3">Larga (3px)</option>
</select>

<canvas id="canvas"></canvas>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("file").onchange=e=>{
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(e.target.files[0])
}

// ================= ANALISI =================
function analyze(){

let w=canvas.width
let h=canvas.height
let band=parseInt(document.getElementById("band").value)

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

// === GRAYSCALE ===
let gray=new Float32Array(w*h)
for(let i=0,j=0;i<d.length;i+=4,j++){
gray[j]=(d[i]+d[i+1]+d[i+2])/3
}

// === SMOOTH (riduce rumore) ===
let smooth=new Float32Array(w*h)
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x
smooth[i]=(gray[i]+gray[i-1]+gray[i+1]+gray[i-w]+gray[i+w])/5
}
}

// === DETECT LINEE CHIARE ===
let lineMask=new Uint8Array(w*h)

for(let i=0;i<w*h;i++){
// linea = più chiara del contesto
let g=smooth[i]
if(g>170){ 
lineMask[i]=1
}
}

// === EDGE per rafforzare linee ===
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x
let gx = -smooth[i-1]+smooth[i+1]
let gy = -smooth[i-w]+smooth[i+w]
let g=Math.abs(gx)+Math.abs(gy)

if(g>30 && smooth[i]>150){
lineMask[i]=1
}
}
}

// === DILATA banda attorno linea ===
let bandMask=new Uint8Array(w*h)

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
let i=y*w+x
if(lineMask[i]){
for(let dy=-band;dy<=band;dy++){
for(let dx=-band;dx<=band;dx++){
let nx=x+dx, ny=y+dy
if(nx>=0 && ny>=0 && nx<w && ny<h){
bandMask[ny*w+nx]=1
}
}
}
}
}
}

// === ANALISI CONTINUITÀ ===
let totalLine=0
let chip=0

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=y*w+x

if(lineMask[i]){

totalLine++

let g=smooth[i]

// === confronto con vicini lungo direzione ===
let diff = Math.abs(smooth[i] - (smooth[i-1]+smooth[i+1]+smooth[i-w]+smooth[i+w])/4)

// === criterio chipping ===
// linea "indebolita" o interrotta
if(g<150 || diff>25){
chip++

// evidenzia
let p=i*4
d[p]=255
d[p+1]=0
d[p+2]=0
}
}
}
}

// === percentuale ===
let perc = totalLine>0 ? (chip/totalLine)*100
