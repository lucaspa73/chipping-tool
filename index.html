<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chipping Tool PRO V23</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f6f8}
canvas{max-width:95%;margin-top:10px;border-radius:12px}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#007bff;color:#fff}
</style>
</head>

<body>

<h1>Chipping Tool PRO V23</h1>

<input type="file" id="file"><br>
<button onclick="analyze()">Analisi V23 (Precisione Alta)</button>

<canvas id="canvas"></canvas>
<div id="res"></div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")
let img=new Image()

document.getElementById("file").onchange=e=>{
img.onload=()=>{
canvas.width=img.width
canvas.height=img.height
ctx.drawImage(img,0,0)
}
img.src=URL.createObjectURL(e.target.files[0])
}

function analyze(){

let w=canvas.width
let h=canvas.height

let imgData=ctx.getImageData(0,0,w,h)
let d=imgData.data

// ===== GRAYSCALE =====
let gray=new Float32Array(w*h)
for(let i=0,j=0;i<d.length;i+=4,j++){
gray[j]=(d[i]+d[i+1]+d[i+2])/3
}

// ===== SMOOTH =====
let smooth=new Float32Array(w*h)
for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x
smooth[i]=(
gray[i] +
gray[i-1] +
gray[i+1] +
gray[i-w] +
gray[i+w]
)/5
}
}

// ===== RIDGE DETECTION (linee bianche) =====
let ridge=new Uint8Array(w*h)

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=y*w+x

let center=smooth[i]

// confronto con vicini (linea = massimo locale)
if(
center > smooth[i-1] &&
center > smooth[i+1] &&
center > smooth[i-w] &&
center > smooth[i+w]
){
ridge[i]=1
}
}
}

// ===== ESPANSIONE LINEA =====
let lineMask=new Uint8Array(w*h)

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){
let i=y*w+x
if(ridge[i]){
for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){
lineMask[(y+dy)*w+(x+dx)]=1
}
}
}
}
}

// ===== ANALISI CONTINUITÀ =====
let total=0
let chip=0

for(let y=2;y<h-2;y++){
for(let x=2;x<w-2;x++){

let i=y*w+x

if(lineMask[i]){

total++

// differenza locale (continuità)
let avg = (
smooth[i-1]+smooth[i+1]+smooth[i-w]+smooth[i+w]
)/4

let diff = Math.abs(smooth[i]-avg)

// se la linea "sparisce" o si rompe
if(diff < 5){ // troppo uniforme → perdita incisione
chip++

let p=i*4
d[p]=255
d[p+1]=0
d[p+2]=0
}
}
}
}

// ===== CALCOLO =====
let perc = total>0 ? (chip/total)*100 : 0

// ISO realistico
let iso=0
if(perc>1) iso=1
if(perc>5) iso=2
if(perc>10) iso=3
if(perc>20) iso=4
if(perc>40) iso=5

ctx.putImageData(imgData,0,0)

document.getElementById("res").innerHTML=
`<h2>Chipping: ${perc.toFixed(2)} % | ISO: ${iso}</h2>`

}

</script>

</body>
</html>
